<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <!-- tabindex="0" so the canvas can hold keyboard focus. The stock
           template ships it as tabindex="-1" and never focuses it, so with
           the new Input System (keyboard events only reach the focused DOM
           element) nothing worked until fullscreen transferred focus to the
           canvas. We focus it on load and on every click instead. -->
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="0"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">{{{ PRODUCT_NAME }}}</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");
      var footer = document.querySelector("#unity-footer");
      var baseCanvasWidth = Number("{{{ WIDTH }}}");
      var baseCanvasHeight = Number("{{{ HEIGHT }}}");
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      // Keep the authored aspect ratio while fitting both dimensions of the
      // browser. Unity may change canvas.width/height for devicePixelRatio, so
      // the template dimensions are captured separately and remain the stable
      // CSS sizing reference.
      function resizeUnityCanvas() {
        var footerHeight = isMobile ? 0 : 38;
        var availableWidth = Math.max(1, window.innerWidth);
        var availableHeight = Math.max(1, window.innerHeight - footerHeight);
        var scale = Math.min(
          availableWidth / baseCanvasWidth,
          availableHeight / baseCanvasHeight
        );
        var cssWidth = Math.max(1, Math.floor(baseCanvasWidth * scale));
        var cssHeight = Math.max(1, Math.floor(baseCanvasHeight * scale));

        canvas.style.width = cssWidth + "px";
        canvas.style.height = cssHeight + "px";
        container.style.width = cssWidth + "px";
        container.style.height = (cssHeight + footerHeight) + "px";
        if (!isMobile) footer.style.width = cssWidth + "px";
      }

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      if (isMobile) {
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      }
      resizeUnityCanvas();
      window.addEventListener("resize", resizeUnityCanvas);
      window.addEventListener("orientationchange", resizeUnityCanvas);

#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif
      document.querySelector("#unity-loading-bar").style.display = "block";

      // Keyboard focus fix: the new Input System only receives key events when
      // the canvas is the focused element. Grab focus on load, and re-grab it
      // whenever the user clicks into the canvas, so the exhibit responds
      // without the visitor having to enter fullscreen first.
      function focusCanvas() { try { canvas.focus(); } catch (e) {} }

      // Cursor fix: right-drag orbits the camera, but in a windowed page the
      // browser reads that drag as a native drag-and-drop / text-selection and
      // shows a red "not-allowed" cursor that can stick. Suppress the browser's
      // drag, selection and context menu over the canvas, and pin its cursor.
      canvas.style.cursor = "default";
      canvas.style.userSelect = "none";
      canvas.style.webkitUserSelect = "none";
      canvas.style.touchAction = "none";
      canvas.setAttribute("draggable", "false");
      canvas.addEventListener("dragstart", (e) => e.preventDefault());
      canvas.addEventListener("selectstart", (e) => e.preventDefault());
      // Right-click is a camera control here, not a menu trigger.
      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          resizeUnityCanvas();
          focusCanvas();
          window.addEventListener("load", focusCanvas);
          // pointerdown fires before focus is stolen elsewhere; keep the canvas
          // focused on every interaction (menus, buttons, dragging).
          canvas.addEventListener("pointerdown", focusCanvas);
          window.addEventListener("focus", focusCanvas);
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
      // In case the loader is cached and onload already fired, and to catch the
      // very first interaction anywhere on the page.
      window.addEventListener("pointerdown", focusCanvas);
    </script>
  </body>
</html>
